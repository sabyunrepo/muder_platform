name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-check:
    name: Go Lint + Test
    runs-on: self-hosted
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: mmp_test
          POSTGRES_USER: mmp
          POSTGRES_PASSWORD: mmp_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/server
    env:
      DATABASE_URL: postgres://mmp:mmp_test@localhost:5432/mmp_test?sslmode=disable
      REDIS_URL: redis://localhost:6379
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.25"
          cache-dependency-path: apps/server/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.11.4
          working-directory: apps/server

      # Phase 19 Residual PR-5a: mockgen drift gate.
      #
      # Fails if any mocks/mock_service.go is stale relative to its source
      # interface. Regenerate locally:
      #   cd apps/server && go generate ./...
      - name: mockgen drift check
        working-directory: apps/server
        run: |
          go generate ./...
          if ! git diff --exit-code; then
            echo "::error::mockgen 산출물 drift. 'cd apps/server && go generate ./...' 실행 후 커밋하세요."
            exit 1
          fi

      # Phase 19 PR-1: WS Contract SSOT drift gate.
      #
      # The frontend WsEventType enum + Direction/Category/Status maps are
      # generated from apps/server/internal/ws/envelope_catalog_*.go.
      # If a catalog edit lands without regenerating
      # packages/shared/src/ws/types.generated.ts, this step fails with a
      # non-empty diff so the PR cannot merge with a stale TS contract.
      #
      # Regenerate locally:
      #   cd apps/server && go run ./cmd/wsgen
      - name: WS contract drift gate
        run: |
          go run ./cmd/wsgen
          git diff --exit-code ../../packages/shared/src/ws/types.generated.ts

      # Phase 19 PR-2b: PlayerAwareModule coverage gate.
      #
      # Fails if any engine.Module's BuildStateFor() delegates back to
      # BuildState() (the stub pattern that pre-PR-2b modules used). Real
      # per-player redaction or explicit PublicStateMarker opt-out only.
      # Exceptions are declared in the script itself (currently:
      # crime_scene/combination → tracked by PR-2c).
      - name: PlayerAware coverage lint
        working-directory: ${{ github.workspace }}
        run: bash scripts/check-playeraware-coverage.sh

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -20

      - name: Upload Go coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          files: apps/server/coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: backend
          fail_ci_if_error: false

      - name: Build server
        run: go build ./cmd/server

  ts-check:
    name: TypeScript Lint + Test + Build
    runs-on: self-hosted
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Typecheck
        run: pnpm turbo typecheck

      - name: Test
        run: pnpm turbo test

      - name: Build workspace packages (for web coverage)
        run: pnpm turbo build --filter=@mmp/web^...

      - name: Web coverage
        run: pnpm --filter @mmp/web test:coverage

      - name: Upload Vitest coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          files: apps/web/coverage/coverage-final.json
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: frontend
          fail_ci_if_error: false

      - name: Vitest coverage PR summary
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@c0c9b09c93750ee1d8335d14e94ce3d6fc61df50 # v2.11.0
        with:
          vite-config-path: apps/web/vitest.config.ts
          working-directory: apps/web

      - name: Build
        run: pnpm turbo build

  coverage-guard:
    name: Coverage Regression Guard (warn-only)
    runs-on: self-hosted
    needs: [go-check, ts-check]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Coverage delta placeholder
        run: |
          echo "::notice::Coverage regression guard is currently warn-only."
          echo "::notice::Enforcement PR follow-up scheduled after 2026-05-28."
          echo "::notice::Codecov dashboard provides delta visibility: https://codecov.io/gh/sabyunrepo/muder_platform"

  docker-build:
    name: Docker Build Check
    runs-on: self-hosted
    needs: [go-check, ts-check]
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

      - name: Build Docker image
        id: docker-build
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: apps/server
          file: apps/server/Dockerfile
          push: false
          load: true
          tags: ghcr.io/sabyunrepo/mmp-server:ci-${{ github.sha }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/sabyunrepo/mmp-server:ci-${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: true
          artifact-name: sbom-cyclonedx

      - name: Attest build provenance
        # Only on main pushes — PR runs skip this to avoid sigstore noise.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/sabyunrepo/mmp-server
          subject-digest: ${{ steps.docker-build.outputs.digest }}

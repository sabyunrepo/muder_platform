name: Security — Fast Feedback

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: security-fast-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck (Go SCA)
    runs-on: self-hosted
    # Phase 22 W1.5 PR-8 fold-in (PR-170 8ce9c0b run cancelled at 5:13):
    # containerized runner 의 setup-go cache miss + go install govulncheck +
    # scan 이 5분 timeout 초과. 10분 으로 상향 (cache warm-up 후 정상 ~3분).
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: apps/server/go.mod
          cache: false  # PR-12: ~/.cache/go-build 누적 폭증 회피

      - name: Cleanup stale Go module directory  # PR-12 hotfix: tar 충돌 방지
        run: sudo rm -rf ~/go/pkg/mod ~/.cache/go-build

      - name: Cache Go modules
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ runner.os }}-${{ hashFiles('apps/server/go.sum') }}
          restore-keys: |
            go-mod-${{ runner.os }}-

      - name: Verify Go module integrity
        working-directory: apps/server
        run: go mod verify

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      # Warn-only policy (Phase 18.7 Wave 2 onboarding, 6 weeks).
      # Existing vulns surface in logs without blocking merges; deps-bump
      # follow-up PR tracks remediation. Enforce PR after 2026-05-28.
      - name: Run govulncheck
        working-directory: apps/server
        continue-on-error: true
        run: govulncheck ./...

  gitleaks:
    name: gitleaks (Secret scan)
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: false
          # Phase 22 W1.5 PR-8: containerized runner working dir mismatch.
          # gitleaks-action v2.3.9 의 artifact upload step 이 rootDirectory:
          # /home/runner 를 하드코딩 → containerized runner 환경에서 fail.
          # scan 자체는 SUCCESS, summary 는 GHA job summary 로 표시.
          # Artifact 복원은 Phase 23 Custom Image migration 후 검토.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
          GITLEAKS_ENABLE_SUMMARY: true

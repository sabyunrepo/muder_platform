name: Security — Deep Scan (SARIF)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * *"    # 04:00 UTC daily

concurrency:
  group: security-deep-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    name: Trivy (container CVE)
    runs-on: arc-runner-set
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Phase 23 Custom Image: docker GID 990 정착 (group docker-host + runner user 가입).
      # docker.sock 직접 접근 가능 — sudo + tarball 우회 dead code.
      - name: Build server image + save tarball
        run: |
          set -euo pipefail
          docker build \
            -f apps/server/Dockerfile \
            -t mmp-server:security-scan \
            apps/server
          # tarball 으로 export — trivy-action input mode 가 docker.sock 불필요
          docker save mmp-server:security-scan -o /tmp/mmp-server.tar

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          input: /tmp/mmp-server.tar
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@7fc6561ed893d15cec696e062df840b21db27eb0 # v4.35.2
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

      # Phase 23 #2 fold-in (Sec-MED-3): host disk 누적 cleanup.
      - name: Cleanup security-scan image
        if: always()
        run: docker rmi mmp-server:security-scan 2>/dev/null || true

  osv-scanner:
    # Warn-only policy (Phase 18.7 Wave 2 onboarding, 6 weeks).
    # Existing lockfile vulns surface as SARIF in Security tab without
    # blocking merges; deps-bump follow-up PR tracks remediation.
    # Enforce PR after 2026-05-28.
    # Standalone (not reusable workflow) because continue-on-error is
    # unsupported on `uses:` jobs.
    name: osv-scanner (lockfile SCA)
    runs-on: arc-runner-set
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: apps/server/go.sum

      - name: Install osv-scanner
        run: go install github.com/google/osv-scanner/v2/cmd/osv-scanner@v2.3.5

      - name: Run osv-scanner (warn-only, SARIF output)
        continue-on-error: true
        run: |
          osv-scanner scan source \
            --lockfile=go.mod:apps/server/go.mod \
            --lockfile=pnpm-lock.yaml \
            --format=sarif \
            --output=osv-results.sarif \
            --recursive

      - name: Upload osv-scanner SARIF
        if: always() && hashFiles('osv-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@7fc6561ed893d15cec696e062df840b21db27eb0 # v4.35.2
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: arc-runner-set
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript', 'go']
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: apps/server/go.sum

      # Phase 23 Custom Image: base에 Node v20 사전 install (system PATH 노출).
      # CodeQL action의 spawn child process가 자연 v20 사용 — setup-node + symlink 우회 dead code.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7fc6561ed893d15cec696e062df840b21db27eb0 # v4.35.2
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
          # Phase 22 W1.5 PR-8 fold-in (PR-170 1st CI run OOM):
          # 2048 MB 기본은 javascript-typescript 의 security-extended +
          # security-and-quality query suite 실행 시 Java heap OOM 발생.
          # 4096 으로 상향 — containerized runner 호스트 메모리 충분.
          ram: 4096

      - name: Autobuild
        uses: github/codeql-action/autobuild@7fc6561ed893d15cec696e062df840b21db27eb0 # v4.35.2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7fc6561ed893d15cec696e062df840b21db27eb0 # v4.35.2
        with:
          category: "/language:${{ matrix.language }}"
          # init 의 ram 과 일관 — analyze step 도 동일 한도 적용.
          ram: 4096

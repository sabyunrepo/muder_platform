name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-check:
    name: Go Lint + Test
    runs-on: self-hosted
    defaults:
      run:
        working-directory: apps/server
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Phase 22 W1.5 PR-8 DEBT-4: Service containers (myoung34/github-runner ↔
      # GHA services 호환 우회). 정상 GHA services block 은 containerized runner
      # 의 network namespace 와 충돌. 같은 runners-net bridge 에 직접 docker run
      # → hostname 접근 (PR-168 e2e-stubbed.yml 동일 패턴).
      # 추후 .github/actions/start-services/action.yml 으로 추출 검토 (Phase 23).
      - name: Start postgres + redis
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          PG_NAME="ci-go-pg-${{ github.run_id }}-${{ github.run_attempt }}"
          REDIS_NAME="ci-go-redis-${{ github.run_id }}-${{ github.run_attempt }}"
          echo "PG_NAME=$PG_NAME" >> "$GITHUB_ENV"
          echo "REDIS_NAME=$REDIS_NAME" >> "$GITHUB_ENV"

          # runners-net network 동적 검출 (compose project prefix 무관).
          RUNNERS_NET=$(sudo docker network ls --format '{{.Name}}' | grep -E '(^|_)runners-net$' | head -1)
          if [ -z "$RUNNERS_NET" ]; then
            echo "::error::runners-net network not found on host"
            sudo docker network ls
            exit 1
          fi
          echo "RUNNERS_NET=$RUNNERS_NET" >> "$GITHUB_ENV"
          echo "Detected runners-net: $RUNNERS_NET"

          # 이전 run cleanup (이름 충돌 방지)
          sudo docker rm -f "$PG_NAME" "$REDIS_NAME" 2>/dev/null || true

          sudo docker run -d --name "$PG_NAME" \
            --network "$RUNNERS_NET" \
            -e POSTGRES_DB=mmp_test \
            -e POSTGRES_USER=mmp \
            -e POSTGRES_PASSWORD=mmp_test \
            --health-cmd "pg_isready -U mmp -d mmp_test" \
            --health-interval 5s \
            --health-timeout 3s \
            --health-retries 10 \
            postgres:17-alpine

          sudo docker run -d --name "$REDIS_NAME" \
            --network "$RUNNERS_NET" \
            --health-cmd "redis-cli ping" \
            --health-interval 5s \
            --health-timeout 3s \
            --health-retries 10 \
            redis:7-alpine

          # health 대기 — Docker healthcheck max = interval 5s × retries 10 = 50s.
          # PR-170 4-agent review (Perf-1 + Test-1) fold-in: 60s ceiling 으로 상향.
          # 30s 이전 ceiling 은 cold start (image pull + initdb) 시 false-fail 가능.
          for i in $(seq 1 60); do
            pg_health=$(sudo docker inspect --format='{{.State.Health.Status}}' "$PG_NAME" 2>/dev/null || echo "starting")
            redis_health=$(sudo docker inspect --format='{{.State.Health.Status}}' "$REDIS_NAME" 2>/dev/null || echo "starting")
            if [ "$pg_health" = "healthy" ] && [ "$redis_health" = "healthy" ]; then
              echo "Both services healthy after ${i}s"
              break
            fi
            sleep 1
          done
          if [ "$pg_health" != "healthy" ] || [ "$redis_health" != "healthy" ]; then
            echo "::error::services failed to become healthy (postgres=$pg_health, redis=$redis_health)"
            sudo docker logs "$PG_NAME" 2>&1 | tail -30
            sudo docker logs "$REDIS_NAME" 2>&1 | tail -30
            exit 1
          fi

      # runners-net 의 hostname 으로 접근 (ephemeral host port 패턴 대체).
      - name: Export service connection env
        working-directory: ${{ github.workspace }}
        run: |
          echo "DATABASE_URL=postgres://mmp:mmp_test@${PG_NAME}:5432/mmp_test?sslmode=disable" >> "$GITHUB_ENV"
          echo "REDIS_URL=redis://${REDIS_NAME}:6379" >> "$GITHUB_ENV"

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.25"
          # PR-12: setup-go default cache 가 ~/.cache/go-build 까지 push →
          # 매 run 누적으로 cache 폭증 (369MB → 2.4GB+, fetch stuck 야기).
          # cache: false 로 setup-go 자체 cache 비활성 + 직후 actions/cache 로
          # ~/go/pkg/mod 만 narrow cache.
          cache: false

      - name: Cache Go modules
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ runner.os }}-${{ hashFiles('apps/server/go.sum') }}
          restore-keys: |
            go-mod-${{ runner.os }}-

      # PR-12 Security MED-1 fold-in: restore-keys fallback 시 stale/오염 cache
      # 차단. go mod verify 가 모든 module 의 sum 을 go.sum 과 비교 — checksum
      # 불일치 시 step fail.
      - name: Verify Go module integrity
        run: go mod verify

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.11.4
          working-directory: apps/server

      # Phase 19 Residual PR-5a: mockgen drift gate.
      #
      # Fails if any mocks/mock_service.go is stale relative to its source
      # interface. Regenerate locally:
      #   cd apps/server && go generate ./...
      - name: mockgen drift check
        working-directory: apps/server
        run: |
          go generate ./...
          if ! git diff --exit-code; then
            echo "::error::mockgen 산출물 drift. 'cd apps/server && go generate ./...' 실행 후 커밋하세요."
            exit 1
          fi

      # Phase 19 PR-1: WS Contract SSOT drift gate.
      #
      # The frontend WsEventType enum + Direction/Category/Status maps are
      # generated from apps/server/internal/ws/envelope_catalog_*.go.
      # If a catalog edit lands without regenerating
      # packages/shared/src/ws/types.generated.ts, this step fails with a
      # non-empty diff so the PR cannot merge with a stale TS contract.
      #
      # Regenerate locally:
      #   cd apps/server && go run ./cmd/wsgen
      - name: WS contract drift gate
        run: |
          go run ./cmd/wsgen
          git diff --exit-code ../../packages/shared/src/ws/types.generated.ts

      # Phase 19 PR-2b: PlayerAwareModule coverage gate.
      #
      # Fails if any engine.Module's BuildStateFor() delegates back to
      # BuildState() (the stub pattern that pre-PR-2b modules used). Real
      # per-player redaction or explicit PublicStateMarker opt-out only.
      # Exceptions are declared in the script itself (currently:
      # crime_scene/combination → tracked by PR-2c).
      - name: PlayerAware coverage lint
        working-directory: ${{ github.workspace }}
        run: bash scripts/check-playeraware-coverage.sh

      # Phase 22 W1.5 PR-8 testcontainers-go fold-in (PR-170 1st CI run 이후
      # 노출된 pre-existing 부채):
      # internal/auditlog, internal/editor 등 패키지가 testcontainers-go 로
      # host docker.sock 직접 접근 → containerized runner 의 sup group 990
      # lost 환경에서 permission denied.
      # 정공: sudo -E env "PATH=$PATH" go test 로 root 권한 docker.sock
      # 접근 + 환경변수 (HOME, GOPATH, GOCACHE, DATABASE_URL, REDIS_URL,
      # PG_NAME, REDIS_NAME) 보존.
      # Image level fix (runner user 의 docker group GID 990 정착) 은
      # Phase 23 Custom Image carry-over.
      - name: Run tests
        run: sudo -E env "PATH=$PATH" go test -race -coverprofile=coverage.out ./...

      # sudo go test 로 root:root 생성 → 후속 step (Codecov upload + artifact
      # upload) 가 read 가능하게 ownership 정정.
      - name: Fix coverage.out ownership
        run: sudo chown "$(id -u):$(id -g)" coverage.out

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -20

      - name: Upload Go coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          files: apps/server/coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: backend
          fail_ci_if_error: false

      - name: Upload Go coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: apps/server/coverage.out
          retention-days: 1

      - name: Build server
        run: go build ./cmd/server

      # Phase 22 W1.5 PR-8 DEBT-4: postgres + redis container cleanup
      # 다음 run 이름 충돌 방지 + container leak 방지
      - name: Cleanup postgres + redis
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          sudo docker rm -f "${PG_NAME:-}" "${REDIS_NAME:-}" 2>/dev/null || true

  ts-check:
    name: TypeScript Lint + Test + Build
    runs-on: self-hosted
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Typecheck
        run: pnpm turbo typecheck

      - name: Test
        run: pnpm turbo test

      - name: Build workspace packages (for web coverage)
        run: pnpm turbo build --filter=@mmp/web^...

      - name: Web coverage
        run: pnpm --filter @mmp/web test:coverage

      - name: Upload Vitest coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          files: apps/web/coverage/coverage-final.json
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: frontend
          fail_ci_if_error: false

      - name: Upload Web coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: apps/web/coverage/coverage-summary.json
          retention-days: 1

      - name: Vitest coverage PR summary
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@c0c9b09c93750ee1d8335d14e94ce3d6fc61df50 # v2.11.0
        with:
          vite-config-path: apps/web/vitest.config.ts
          working-directory: apps/web

      - name: Build
        run: pnpm turbo build

  coverage-guard:
    # Phase 19 Residual PR-5b — Coverage Gate.
    # baseline: Go 43.9% / FE Lines 51.75% / FE Branches 79.66% / FE Functions 55.66% (2026-04-21)
    # current threshold: Go 41% / FE Lines 49% / FE Branches 77% / FE Functions 53% (baseline-2% buffer)
    # 로드맵:
    #   Phase 20: Go 55% / FE Lines 55% / FE Branches 80% (+~5%p — 추가 테스트 PR 선행 필수)
    #   Phase 21: Go 70% / FE Lines 65% / FE Branches 85% (+15%p — 하한 상향 전 반드시 테스트 보강)
    #   하한 상향 전에 반드시 추가 테스트 PR 로 baseline 끌어올리기.
    name: Coverage Regression Guard
    runs-on: self-hosted
    needs: [go-check, ts-check]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download Go coverage
        uses: actions/download-artifact@v4
        with:
          name: go-coverage
          path: apps/server

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.25"
          cache: false  # PR-12: ~/.cache/go-build 누적 폭증 회피

      - name: Cache Go modules
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ runner.os }}-${{ hashFiles('apps/server/go.sum') }}
          restore-keys: |
            go-mod-${{ runner.os }}-

      - name: Verify Go module integrity
        working-directory: apps/server
        run: go mod verify

      - name: Go coverage gate
        working-directory: apps/server
        run: |
          TOTAL=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          THRESHOLD=41
          if awk "BEGIN {exit !($TOTAL < $THRESHOLD)}"; then
            echo "::error::Go coverage ${TOTAL}% is below threshold ${THRESHOLD}%"
            echo "::error::Run 'cd apps/server && go test -coverprofile=coverage.out ./...' locally to investigate"
            exit 1
          fi
          echo "::notice::Go coverage ${TOTAL}% >= ${THRESHOLD}% (threshold)"

      - name: Download Web coverage
        uses: actions/download-artifact@v4
        with:
          name: web-coverage
          path: apps/web/coverage

      # Phase 22 W1.5 PR-8 fold-in (PR-170 ce1fa62 1st CI run 노출):
      # containerized runner image / bare-host runner 모두 jq 미사전 install.
      # Web coverage gate step 이 jq 의존 → "jq: command not found" exit 127.
      # apt-get 으로 사전 install (idempotent, 이미 있으면 skip).
      # Image level fix (Custom Image 에 jq 포함) 은 Phase 23 carry-over.
      - name: Ensure jq installed
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq jq
          fi
          jq --version

      - name: Web coverage gate
        run: |
          LINES=$(jq '.total.lines.pct' apps/web/coverage/coverage-summary.json)
          BRANCHES=$(jq '.total.branches.pct' apps/web/coverage/coverage-summary.json)
          FUNCTIONS=$(jq '.total.functions.pct' apps/web/coverage/coverage-summary.json)
          LINES_THR=49
          BRANCHES_THR=77
          FUNCTIONS_THR=53
          FAIL=0
          if awk "BEGIN {exit !($LINES < $LINES_THR)}"; then
            echo "::error::FE Lines coverage ${LINES}% is below threshold ${LINES_THR}%"
            FAIL=1
          else
            echo "::notice::FE Lines coverage ${LINES}% >= ${LINES_THR}% (threshold)"
          fi
          if awk "BEGIN {exit !($BRANCHES < $BRANCHES_THR)}"; then
            echo "::error::FE Branches coverage ${BRANCHES}% is below threshold ${BRANCHES_THR}%"
            FAIL=1
          else
            echo "::notice::FE Branches coverage ${BRANCHES}% >= ${BRANCHES_THR}% (threshold)"
          fi
          if awk "BEGIN {exit !($FUNCTIONS < $FUNCTIONS_THR)}"; then
            echo "::error::FE Functions coverage ${FUNCTIONS}% is below threshold ${FUNCTIONS_THR}%"
            FAIL=1
          else
            echo "::notice::FE Functions coverage ${FUNCTIONS}% >= ${FUNCTIONS_THR}% (threshold)"
          fi
          if [ "$FAIL" = "1" ]; then
            echo "::error::Run 'cd apps/web && pnpm test:coverage' locally to investigate"
            exit 1
          fi

  docker-build:
    name: Docker Build Check
    runs-on: self-hosted
    needs: [go-check, ts-check]
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Phase 22 W1.5 PR-8 Docker Build Check fold-in (PR-170 ce1fa62 1st CI
       # run 노출): docker/setup-buildx-action + docker/build-push-action 모두
      # docker.sock 직접 접근 → containerized runner sup group 990 lost 환경
      # 에서 permission denied. Trivy 와 동일 root cause.
      # 정공: setup-buildx 제거 + manual sudo docker build (GHA cache 효과
      # 포기, push branch 가 아닌 PR Build Check 라 cache 무가치).
      # SBOM: anchore/sbom-action 도 docker.sock 사용 → manual syft 으로 교체
      # 검토 필요. 현 단계는 sudo docker save 로 tarball 생성 후 syft input.
      # Image level fix (docker group GID 990 정착) 은 Phase 23 Custom Image.
      - name: Build Docker image (manual via sudo docker)
        id: docker-build
        run: |
          set -euo pipefail
          IMAGE_REF="ghcr.io/sabyunrepo/mmp-server:ci-${{ github.sha }}"
          sudo docker build \
            -f apps/server/Dockerfile \
            -t "$IMAGE_REF" \
            apps/server
          # digest 추출 (attest-build-provenance 는 push branch 만 사용 — PR
          # 단계는 skip 이지만 step output 일관성 위해 emit)
          DIGEST=$(sudo docker inspect "$IMAGE_REF" --format='{{.Id}}')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          # SBOM 용 tarball export
          sudo docker save "$IMAGE_REF" -o /tmp/mmp-server-ci.tar
          sudo chown "$(id -u):$(id -g)" /tmp/mmp-server-ci.tar

      # PR-170 4c7e8ca run 에서 anchore/sbom-action 의 syft install 실패
      # ("gzip: stdin: not in gzip format") — containerized runner 환경
      # 별개 이슈. SBOM 은 attest-build-provenance 와 동일 조건 (main push) 만
      # 실행 → PR run 에서 skip 으로 우회. PR Build Check 의 검증 목표 (image
      # build 성공) 는 그대로 충족.
      - name: Generate SBOM (CycloneDX)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          # tarball 입력 — docker.sock 의존 회피
          file: /tmp/mmp-server-ci.tar
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: true
          artifact-name: sbom-cyclonedx

      - name: Attest build provenance
        # Only on main pushes — PR runs skip this to avoid sigstore noise.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/sabyunrepo/mmp-server
          subject-digest: ${{ steps.docker-build.outputs.digest }}

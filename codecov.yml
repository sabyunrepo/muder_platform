coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%  # 기존 대비 1%p 회귀 허용 (noise margin)
    patch:
      default:
        target: 70%    # 신규 코드는 70% 커버 요구 (patch 집중)
        threshold: 0%  # 신규 코드 회귀 0 허용

# Phase 19 Residual PR-5a: 자동 생성 mockgen 산출물 + 전환기 shim 은
# coverage 집계에서 제외. auto-generated 코드는 테스트 대상 아니며 집계에
# 포함 시 baseline 왜곡(허수 상승 / 하락) 유발.
ignore:
  - "apps/server/internal/**/mocks/**"
  - "apps/server/internal/**/mock_*.go"
  - "apps/server/internal/**/*_mock.go"
  - "apps/server/internal/**/mock_shim_test.go"
  # sqlc-generated — intentionally excluded from coverage
  - "apps/server/internal/db/*.sql.go"
  - "apps/server/internal/db/models.go"
  - "apps/server/internal/db/db.go"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

name: Module Isolation

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/server/internal/module/**'
      - 'apps/server/internal/engine/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  module-isolation:
    name: Module Isolation Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.24"
          cache-dependency-path: apps/server/go.sum
      - name: Module Isolation
        run: ../../scripts/test-module-isolation.sh
      - name: E2E Smoke Tests
        run: go test -race -timeout 120s ./internal/e2e/...

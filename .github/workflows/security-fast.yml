name: Security — Fast Feedback

# paths filter (CI 슬림화 — Phase 23 follow-up "CI pruning P0" 후속):
# docs/memory/plan 변경 PR 시 fire 0. Go/Node 의존성 또는 본 workflow 자체 변경에만 fire.
on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'go.mod'
      - 'go.sum'
      - 'pnpm-lock.yaml'
      - '.gitleaks.toml'
      - '.github/workflows/security-fast.yml'
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'go.mod'
      - 'go.sum'
      - 'pnpm-lock.yaml'
      - '.gitleaks.toml'
      - '.github/workflows/security-fast.yml'

concurrency:
  group: security-fast-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck (Go SCA)
    runs-on: arc-runner-set
    # Phase 22 W1.5 PR-8 fold-in (PR-170 8ce9c0b run cancelled at 5:13):
    # containerized runner 의 setup-go cache miss + go install govulncheck +
    # scan 이 5분 timeout 초과. 10분 으로 상향 (cache warm-up 후 정상 ~3분).
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: apps/server/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      # Warn-only policy (Phase 18.7 Wave 2 onboarding, 6 weeks).
      # Existing vulns surface in logs without blocking merges; deps-bump
      # follow-up PR tracks remediation. Enforce PR after 2026-05-28.
      - name: Run govulncheck
        working-directory: apps/server
        continue-on-error: true
        run: govulncheck ./...

  gitleaks:
    name: gitleaks (Secret scan)
    runs-on: arc-runner-set
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: false
          # Phase 23 Custom Image: docker GID 990 + working dir 정합성. artifact upload 복원 (Sec-MED-2).
          # Verify는 본 PR 머지 + 사용자 host 재배포 후 첫 CI run에서 자연 발생 — fail 시 hotfix + #3 follow-up PR.
          GITLEAKS_ENABLE_SUMMARY: true

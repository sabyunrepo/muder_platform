version: "3"

vars:
  GO_MODULE: github.com/mmp/murder-platform
  GO_SRC: ./apps/server
  GO_BIN: ./bin

tasks:
  # ─── Go ───────────────────────────────────────────────
  go:build:
    desc: Build Go backend
    dir: "{{.GO_SRC}}"
    cmds:
      - go build -o ../{{.GO_BIN}}/server ./cmd/server

  go:test:
    desc: Run Go tests
    dir: "{{.GO_SRC}}"
    cmds:
      - go test -race -cover ./...

  go:lint:
    desc: Lint Go code with golangci-lint
    dir: "{{.GO_SRC}}"
    cmds:
      - golangci-lint run ./...

  go:generate:
    desc: Run sqlc and Go generate
    dir: "{{.GO_SRC}}"
    cmds:
      - sqlc generate
      - go generate ./...

  go:tidy:
    desc: Tidy Go modules
    dir: "{{.GO_SRC}}"
    cmds:
      - go mod tidy

  # ─── TypeScript (pnpm + turbo) ───────────────────────
  ts:install:
    desc: Install Node.js dependencies
    cmds:
      - pnpm install

  ts:build:
    desc: Build all TypeScript packages
    cmds:
      - pnpm run build

  ts:lint:
    desc: Lint all TypeScript packages
    cmds:
      - pnpm run lint

  ts:test:
    desc: Run all TypeScript tests
    cmds:
      - pnpm run test

  ts:typecheck:
    desc: Typecheck all TypeScript packages
    cmds:
      - pnpm run typecheck

  ts:format:
    desc: Format code with Prettier
    cmds:
      - pnpm run format

  # ─── Docker ──────────────────────────────────────────
  docker:build:
    desc: Build Docker images
    cmds:
      - docker compose build

  docker:up:
    desc: Start Docker services
    cmds:
      - docker compose up -d

  docker:down:
    desc: Stop Docker services
    cmds:
      - docker compose down

  docker:logs:
    desc: Tail Docker logs
    cmds:
      - docker compose logs -f

  # ─── Development ─────────────────────────────────────
  dev:
    desc: Start full development environment
    deps:
      - docker:up
    cmds:
      - task: ts:install
      - task: ts:build
      - pnpm run dev

  # ─── Utilities ───────────────────────────────────────
  clean:
    desc: Clean all build artifacts
    cmds:
      - rm -rf {{.GO_BIN}}
      - pnpm run clean

  setup:
    desc: Initial project setup
    cmds:
      - task: ts:install
      - task: go:tidy
      - echo "Setup complete!"

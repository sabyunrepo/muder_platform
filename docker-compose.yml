services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mmf
      POSTGRES_USER: mmp
      POSTGRES_PASSWORD: mmp_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmp -d mmf"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      APP_ENV: development
      DATABASE_URL: postgres://mmp:mmp_dev@postgres:5432/mmf?sslmode=disable
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge

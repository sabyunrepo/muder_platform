name: Gitleaks Secret Scan

# Development-minimum mode: CodeRabbit remains the default PR feedback loop and
# this scan is manual only. Re-enable PR/push secret scanning before service
# operations or when external contributors are added.
on:
  workflow_dispatch:

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (Secret scan)
    runs-on: arc-runner-set
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: false
          # Phase 23 Custom Image: docker GID 990 + working dir 정합성. artifact upload (Sec-MED-2).
          GITLEAKS_ENABLE_SUMMARY: true

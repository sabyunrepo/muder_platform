services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mmf
      POSTGRES_USER: mmp
      POSTGRES_PASSWORD: mmp_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmp -d mmf"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  server:
    image: mmp-server:preview
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      APP_ENV: development
      DATABASE_URL: postgres://mmp:mmp_dev@postgres:5432/mmf?sslmode=disable
      REDIS_URL: redis://redis:6379
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-auto}
      STORAGE_LOCAL_BASE_DIR: ${STORAGE_LOCAL_BASE_DIR:-tmp/uploads}
      STORAGE_R2_ACCOUNT_ID: ${STORAGE_R2_ACCOUNT_ID:-}
      STORAGE_R2_ACCESS_KEY_ID: ${STORAGE_R2_ACCESS_KEY_ID:-}
      STORAGE_R2_SECRET_ACCESS_KEY: ${STORAGE_R2_SECRET_ACCESS_KEY:-}
      STORAGE_R2_BUCKET: ${STORAGE_R2_BUCKET:-}
      STORAGE_R2_PUBLIC_URL: ${STORAGE_R2_PUBLIC_URL:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  migrate:
    image: mmp-server:preview
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://mmp:mmp_dev@postgres:5432/mmf?sslmode=disable
      MIGRATIONS_DIR: /db/migrations
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/migrate-preview"]
    restart: "no"
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge

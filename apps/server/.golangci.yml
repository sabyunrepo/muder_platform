version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # tx.Rollback and similar deferred cleanup errors are intentional.
      - path: _test\.go
        linters:
          - errcheck
      # Unused types/funcs in test helpers are fine.
      - path: _test\.go
        linters:
          - unused
      # SA4023: interface nil comparison — test-only false positive.
      - linters: [staticcheck]
        text: "SA4023"
      # SA9003: empty branch — test assertion pattern and clue validator guard.
      - linters: [staticcheck]
        text: "SA9003"
      # SA1019: deprecated SetNX — tracked for separate Redis upgrade.
      - linters: [staticcheck]
        text: "SA1019"
      # QF1008: embedded field selector style — cosmetic.
      - linters: [staticcheck]
        text: "QF1008"
      # S1009: nil+len check redundancy — cosmetic.
      - linters: [staticcheck]
        text: "S1009"
      # S1016: struct literal conversion — cosmetic.
      - linters: [staticcheck]
        text: "S1016"
      # ST1023: inferred type omission — cosmetic.
      - linters: [staticcheck]
        text: "ST1023"
    paths:
      - third_party$
      - builtin$
      - examples$

formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$

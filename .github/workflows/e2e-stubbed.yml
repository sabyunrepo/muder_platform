name: E2E вҖ” Stubbed Backend

# PR-required job: runs on every PR and push to main.
# Uses a real Postgres + Redis + Go server so PLAYWRIGHT_BACKEND=1
# is set, releasing the skip guard in all backend-gated spec files.
#
# Three core scenarios always execute, sharded 2Г— across two browsers:
#   1. л°© мғқм„ұ вҶ’ мӢңмһ‘ вҶ’ нҺҳмқҙмҰҲ м§„н–ү  (game-session.spec.ts)
#   2. мһ¬м ‘мҶҚ ліөмӣҗ                    (game-reconnect.spec.ts)
#   3. Redaction нҷ•мқё               (game-redaction.spec.ts)
#
# NOTE: job name changed from "E2E Stubbed Backend (Chromium)" to the matrix
# form below. Branch-protection required-check labels MUST be updated after
# this PR merges.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Phase 18.8 PR-5: мҲҳлҸҷ нҠёлҰ¬кұ° м¶”к°Җ. PRм—җм„ң stubbed CIлҘј мһ¬мӢӨн–үн•ҳкұ°лӮҳ
  # лІ нғҖ лӢЁкі„м—җм„ң мһ„мӢң мӢңлӮҳлҰ¬мҳӨ мһ¬нҳ„мқҙ н•„мҡ”н•  л•Ң мӮ¬мҡ©.
  workflow_dispatch:

concurrency:
  group: e2e-stubbed-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E (${{ matrix.browser }} shard ${{ matrix.shard }})
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
        shard: [1, 2]

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: mmp_e2e
          POSTGRES_USER: mmp
          POSTGRES_PASSWORD: mmp_e2e
        # ephemeral host port вҖ” avoids 5432 collision with langfuse on self-hosted runner
        ports:
          - "5432"
        options: >-
          --health-cmd "pg_isready -U mmp -d mmp_e2e"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - "6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      GAME_RUNTIME_V2: "true"
      PLAYWRIGHT_BACKEND: "1"

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Export service connection env (job contextлҠ” step-levelм—җм„ңл§Ң нҸүк°Җ к°ҖлҠҘ вҖ” PR-164 нҡҢк·Җ fix).
      # ephemeral host portлҘј GITHUB_ENVлЎң exportн•ҙ нӣ„мҶҚ stepмқҳ server/migrationмқҙ мһҗлҸҷ мқҪмқҢ.
      - name: Export service connection env
        run: |
          echo "DATABASE_URL=postgres://mmp:mmp_e2e@localhost:${{ job.services.postgres.ports['5432'] }}/mmp_e2e?sslmode=disable" >> "$GITHUB_ENV"
          echo "REDIS_URL=redis://localhost:${{ job.services.redis.ports['6379'] }}" >> "$GITHUB_ENV"

      # в”Җв”Җ Go server в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.24"
          cache-dependency-path: apps/server/go.sum

      - name: Build server
        working-directory: apps/server
        run: go build -o /tmp/mmp-server ./cmd/server

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@v3.27.0

      - name: Run migrations
        working-directory: apps/server
        run: |
          goose -dir db/migrations postgres \
            "host=localhost port=${{ job.services.postgres.ports['5432'] }} user=mmp password=mmp_e2e dbname=mmp_e2e sslmode=disable" \
            up

      - name: Start server
        # DEBT-3: self-hosted runnerлҠ” job мӮ¬мқҙм—җ user н”„лЎңм„ёмҠӨк°Җ leak лҗҳл©ҙ лӢӨмқҢ run мқҳ
        # mmp-server bind к°Җ "address already in use" лЎң мҰүмӮ¬н•ҳкі , мЈҪмқҖ DB connection мқ„
        # л“  orphan listener к°Җ health check + нӣ„мҶҚ request м—җ stale мқ‘лӢөмқ„ лҸҢл ӨмӨҖлӢӨ.
        # мҰқмғҒ: seed register вҶ’ 500 "failed to check existing user".
        # л”°лқјм„ң (1) мӢңмһ‘ м „ мҡ°лҰ¬ user мқҳ mmp-server мһ”мһ¬ м •лҰ¬, (2) нҸ¬нҠё м җмң  мӮ¬м „ кІҖм¶ң,
        # (3) health check лЈЁн”„ л§Ө iteration л§ҲлӢӨ мҡ°лҰ¬ PID мғқмЎҙ нҷ•мқёмқҙ н•„мҡ”.
        run: |
          pkill -f /tmp/mmp-server || true
          sleep 1
          if (ss -ltn 2>/dev/null || netstat -ltn 2>/dev/null) | grep -qE ':8080[[:space:]]'; then
            echo "::error::port 8080 occupied before mmp-server start (orphan or parallel shard)"
            (ss -ltnp 2>/dev/null || netstat -ltnp 2>/dev/null) | grep ':8080' || true
            exit 1
          fi
          /tmp/mmp-server > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> "$GITHUB_ENV"
          ready=0
          for i in $(seq 1 30); do
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "::error::mmp-server (PID $SERVER_PID) died during startup"
              cat /tmp/server.log
              exit 1
            fi
            if curl -sf http://localhost:8080/health >/dev/null; then
              echo "Server ready after ${i}s (PID=$SERVER_PID)"
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" != "1" ]; then
            echo "::error::mmp-server health check did not pass within 30s"
            cat /tmp/server.log
            exit 1
          fi

      # в”Җв”Җ Seed E2E user (Issue #46) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      # game-session/reconnect/redaction specs log in as e2e@test.com.
      # Without this seed, login() times out at 30s and all scenarios fail.

      - name: Seed E2E user
        run: |
          http_code=$(curl -s -o /tmp/seed.out -w "%{http_code}" \
            -X POST http://localhost:8080/api/v1/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"e2e@test.com","password":"e2etest1234","nickname":"E2E Tester"}')
          if [ "$http_code" = "201" ] || [ "$http_code" = "409" ]; then
            echo "Seed OK (http=$http_code)"
          else
            echo "Seed failed (http=$http_code):"
            cat /tmp/seed.out
            exit 1
          fi

      # в”Җв”Җ Seed E2E theme (Phase 18.6 H6 fix re-enables this) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      # createRoom spec requires at least one PUBLISHED theme in the dropdown.
      # Depends on: Seed E2E user + migrations 00001..00003 applied.
      # ThemeCard + ThemeSummary were realigned with the server's snake_case
      # JSON contract (min_players / duration_min / cover_image) and play_count
      # / rating / difficulty are now optional, so this step no longer crashes
      # the lobby via ErrorBoundary.

      - name: Seed E2E theme
        run: |
          PGPASSWORD=mmp_e2e psql -h localhost -p ${{ job.services.postgres.ports['5432'] }} -U mmp -d mmp_e2e \
            -v ON_ERROR_STOP=1 \
            -f apps/server/db/seed/e2e-themes.sql

      # в”Җв”Җ Node / pnpm в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers for matrix
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}

      - name: Build workspace packages
        # @mmp/ws-client is imported by apps/web and needs dist/ at vite dev time.
        # ui-tokens/eslint-config are CSS/config only вҖ” no build script.
        run: pnpm --filter "@mmp/game-logic" --filter "@mmp/shared" --filter "@mmp/ws-client" build

      # в”Җв”Җ Frontend dev server в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

      - name: Start frontend
        working-directory: apps/web
        run: |
          pnpm dev &
          echo "WEB_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000; then
              echo "Frontend ready after ${i}s"
              break
            fi
            sleep 1
          done

      # в”Җв”Җ Core E2E scenarios (sharded + browser matrix) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

      - name: Run E2E
        working-directory: apps/web
        run: |
          pnpm exec playwright test \
            e2e/game-session.spec.ts \
            e2e/game-reconnect.spec.ts \
            e2e/game-redaction.spec.ts \
            --project=${{ matrix.browser }} \
            --shard=${{ matrix.shard }}/2 \
            --retries=1

      # в”Җв”Җ Cleanup в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

      - name: Stop background processes
        if: always()
        run: |
          [ -n "$SERVER_PID" ] && kill "$SERVER_PID" || true
          [ -n "$WEB_PID" ] && kill "$WEB_PID" || true

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: blob-report-${{ matrix.browser }}-${{ matrix.shard }}
          path: apps/web/blob-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test-results (screenshots + traces)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-test-results-${{ matrix.browser }}-${{ matrix.shard }}
          path: apps/web/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mmp-server-log-${{ matrix.browser }}-${{ matrix.shard }}
          path: /tmp/server.log
          retention-days: 7
          if-no-files-found: ignore

  merge-reports:
    name: Merge Playwright reports
    if: always()
    needs: [e2e]
    runs-on: self-hosted
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Install pnpm
        # v5.0.0 reads packageManager from package.json automatically вҖ”
        # no `version:` input to avoid ERR_PNPM_BAD_PM_VERSION collision.
        uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download blob reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML report
        working-directory: apps/web
        run: pnpm exec playwright merge-reports --reporter html ../../all-blob-reports

      - name: Upload merged HTML report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-html-report
          path: apps/web/playwright-report
          retention-days: 7

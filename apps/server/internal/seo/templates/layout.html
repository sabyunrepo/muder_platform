{{define "layout"}}<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} — Murder Mystery Platform</title>
    {{template "head" .}}
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #f59e0b;
            --accent-hover: #d97706;
            --border: #475569;
            --radius: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                         'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        header {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
        }

        header .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
        }

        .logo:hover {
            text-decoration: none;
            color: var(--accent-hover);
        }

        nav a {
            color: var(--text-secondary);
            margin-left: 1.5rem;
            font-size: 0.875rem;
        }

        nav a:hover {
            color: var(--text-primary);
            text-decoration: none;
        }

        main {
            padding: 2.5rem 0;
        }

        footer {
            border-top: 1px solid var(--border);
            padding: 1.5rem 0;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8125rem;
            margin-top: auto;
        }

        footer a {
            color: var(--text-muted);
            margin: 0 0.75rem;
        }

        footer a:hover {
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo">MMP</a>
            <nav>
                <a href="/">홈</a>
                <a href="/privacy">개인정보처리방침</a>
                <a href="/terms">이용약관</a>
            </nav>
        </div>
    </header>
    <main>
        <div class="container">
            {{template "content" .}}
        </div>
    </main>
    <footer>
        <div class="container">
            <p>&copy; 2026 Murder Mystery Platform. All rights reserved.</p>
            <p style="margin-top: 0.5rem;">
                <a href="/privacy">개인정보처리방침</a>
                <a href="/terms">이용약관</a>
            </p>
        </div>
    </footer>
</body>
</html>{{end}}

name: Security — Fast Feedback

# Development-minimum mode: do not run security workers automatically.
# CodeRabbit remains the default PR feedback loop. Run this workflow manually or
# by applying the `ready-for-ci` label when a PR is ready for full validation.
on:
  pull_request:
    branches: [main]
    types: [labeled]
  workflow_dispatch:

concurrency:
  group: security-fast-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck (Go SCA)
    if: github.event_name != 'pull_request' || github.event.label.name == 'ready-for-ci'
    runs-on: arc-runner-set
    # Phase 22 W1.5 PR-8 fold-in (PR-170 8ce9c0b run cancelled at 5:13):
    # containerized runner 의 setup-go cache miss + scanner install +
    # scan 이 5분 timeout 초과. 10분 으로 상향 (cache warm-up 후 정상 ~3분).
    # Phase 25 #349: govulncheck CLI 는 ARC runner image 에 pre-bake 한다.
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: apps/server/go.mod
          cache: false  # image-resident toolchain: avoid setup-go cache hangs on self-hosted runners.

      # Warn-only policy (Phase 18.7 Wave 2 onboarding, 6 weeks).
      # Existing vulns surface in logs without blocking merges; deps-bump
      # follow-up PR tracks remediation. Enforce PR after 2026-05-28.
      - name: Run govulncheck
        working-directory: apps/server
        continue-on-error: true
        run: govulncheck ./...

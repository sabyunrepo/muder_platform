name: Module Isolation

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/server/internal/module/**'
      - 'apps/server/internal/engine/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  module-isolation:
    name: Module Isolation Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.24"
          cache: false  # PR-12: ~/.cache/go-build 누적 폭증 회피
      - name: Cleanup stale Go module directory  # PR-12 hotfix: tar 충돌 방지
        run: sudo rm -rf ~/go/pkg/mod ~/.cache/go-build
      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ runner.os }}-${{ hashFiles('apps/server/go.sum') }}
          restore-keys: |
            go-mod-${{ runner.os }}-
      - name: Verify Go module integrity
        working-directory: apps/server
        run: go mod verify
      - name: Module Isolation
        run: ../../scripts/test-module-isolation.sh
      - name: E2E Smoke Tests
        run: go test -race -timeout 120s ./internal/e2e/...

name: Security вҖ” Deep Scan (SARIF)

on:
  # Development-minimum mode: deep security scan is manual only. Re-enable
  # schedule/main-push scans before service operations through #474.
  # Owner: main Codex during service-hardening planning.
  workflow_dispatch:

concurrency:
  group: security-deep-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    name: Trivy (container CVE)
    runs-on: arc-runner-set
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Phase 23 Custom Image: docker GID 990 м •м°© (group docker-host + runner user к°Җмһ…).
      # docker.sock м§Ғм ‘ м ‘к·ј к°ҖлҠҘ вҖ” sudo + tarball мҡ°нҡҢ dead code.
      - name: Build server image + save tarball
        run: |
          set -euo pipefail
          docker build \
            -f apps/server/Dockerfile \
            -t mmp-server:security-scan \
            apps/server
          # tarball мңјлЎң export вҖ” trivy-action input mode к°Җ docker.sock л¶Ҳн•„мҡ”
          docker save mmp-server:security-scan -o /tmp/mmp-server.tar

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          input: /tmp/mmp-server.tar
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@7fc6561ed893d15cec696e062df840b21db27eb0 # v4.35.2
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

      # Phase 23 #2 fold-in (Sec-MED-3): host disk лҲ„м Ғ cleanup.
      - name: Cleanup security-scan image
        if: always()
        run: docker rmi mmp-server:security-scan 2>/dev/null || true

  osv-scanner:
    # Warn-only policy (Phase 18.7 Wave 2 onboarding, 6 weeks).
    # Existing lockfile vulns surface as SARIF in Security tab without
    # blocking merges; deps-bump follow-up PR tracks remediation.
    # Enforce PR after 2026-05-28.
    # Standalone (not reusable workflow) because continue-on-error is
    # unsupported on `uses:` jobs.
    name: osv-scanner (lockfile SCA)
    runs-on: arc-runner-set
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run osv-scanner (warn-only, SARIF output)
        continue-on-error: true
        run: |
          osv-scanner scan source \
            --lockfile=go.mod:apps/server/go.mod \
            --lockfile=pnpm-lock.yaml \
            --format=sarif \
            --output=osv-results.sarif \
            --recursive

      - name: Upload osv-scanner SARIF
        if: always() && hashFiles('osv-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@7fc6561ed893d15cec696e062df840b21db27eb0 # v4.35.2
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: arc-runner-set
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript', 'go']
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: apps/server/go.sum

      # Phase 23 Custom Image: baseм—җ Node v20 мӮ¬м „ install (system PATH л…ём¶ң).
      # CodeQL actionмқҳ spawn child processк°Җ мһҗм—° v20 мӮ¬мҡ© вҖ” setup-node + symlink мҡ°нҡҢ dead code.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7fc6561ed893d15cec696e062df840b21db27eb0 # v4.35.2
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
          # Phase 22 W1.5 PR-8 fold-in (PR-170 1st CI run OOM):
          # 2048 MB кё°ліёмқҖ javascript-typescript мқҳ security-extended +
          # security-and-quality query suite мӢӨн–ү мӢң Java heap OOM л°ңмғқ.
          # 4096 мңјлЎң мғҒн–Ҙ вҖ” containerized runner нҳёмҠӨнҠё л©”лӘЁлҰ¬ м¶©л¶„.
          ram: 4096

      - name: Autobuild
        uses: github/codeql-action/autobuild@7fc6561ed893d15cec696e062df840b21db27eb0 # v4.35.2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7fc6561ed893d15cec696e062df840b21db27eb0 # v4.35.2
        with:
          category: "/language:${{ matrix.language }}"
          # init мқҳ ram кіј мқјкҙҖ вҖ” analyze step лҸ„ лҸҷмқј н•ңлҸ„ м Ғмҡ©.
          ram: 4096

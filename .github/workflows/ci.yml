name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-check:
    name: Go Lint + Test
    runs-on: self-hosted
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: mmp_test
          POSTGRES_USER: mmp
          POSTGRES_PASSWORD: mmp_test
        # ephemeral host port — avoids 5432 collision with langfuse on self-hosted runner
        ports:
          - "5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        # ephemeral host port — avoids 6379 collision with langfuse-redis on self-hosted runner
        ports:
          - "6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/server
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Export service connection env (job context는 step-level에서만 평가 가능 — PR-164 회귀 fix).
      # ephemeral host port를 GITHUB_ENV로 export해 후속 step의 Go test가 자동 읽음.
      - name: Export service connection env
        working-directory: ${{ github.workspace }}
        run: |
          echo "DATABASE_URL=postgres://mmp:mmp_test@localhost:${{ job.services.postgres.ports['5432'] }}/mmp_test?sslmode=disable" >> "$GITHUB_ENV"
          echo "REDIS_URL=redis://localhost:${{ job.services.redis.ports['6379'] }}" >> "$GITHUB_ENV"

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.25"
          cache-dependency-path: apps/server/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.11.4
          working-directory: apps/server

      # Phase 19 Residual PR-5a: mockgen drift gate.
      #
      # Fails if any mocks/mock_service.go is stale relative to its source
      # interface. Regenerate locally:
      #   cd apps/server && go generate ./...
      - name: mockgen drift check
        working-directory: apps/server
        run: |
          go generate ./...
          if ! git diff --exit-code; then
            echo "::error::mockgen 산출물 drift. 'cd apps/server && go generate ./...' 실행 후 커밋하세요."
            exit 1
          fi

      # Phase 19 PR-1: WS Contract SSOT drift gate.
      #
      # The frontend WsEventType enum + Direction/Category/Status maps are
      # generated from apps/server/internal/ws/envelope_catalog_*.go.
      # If a catalog edit lands without regenerating
      # packages/shared/src/ws/types.generated.ts, this step fails with a
      # non-empty diff so the PR cannot merge with a stale TS contract.
      #
      # Regenerate locally:
      #   cd apps/server && go run ./cmd/wsgen
      - name: WS contract drift gate
        run: |
          go run ./cmd/wsgen
          git diff --exit-code ../../packages/shared/src/ws/types.generated.ts

      # Phase 19 PR-2b: PlayerAwareModule coverage gate.
      #
      # Fails if any engine.Module's BuildStateFor() delegates back to
      # BuildState() (the stub pattern that pre-PR-2b modules used). Real
      # per-player redaction or explicit PublicStateMarker opt-out only.
      # Exceptions are declared in the script itself (currently:
      # crime_scene/combination → tracked by PR-2c).
      - name: PlayerAware coverage lint
        working-directory: ${{ github.workspace }}
        run: bash scripts/check-playeraware-coverage.sh

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -20

      - name: Upload Go coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          files: apps/server/coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: backend
          fail_ci_if_error: false

      - name: Upload Go coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: apps/server/coverage.out
          retention-days: 1

      - name: Build server
        run: go build ./cmd/server

  ts-check:
    name: TypeScript Lint + Test + Build
    runs-on: self-hosted
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Typecheck
        run: pnpm turbo typecheck

      - name: Test
        run: pnpm turbo test

      - name: Build workspace packages (for web coverage)
        run: pnpm turbo build --filter=@mmp/web^...

      - name: Web coverage
        run: pnpm --filter @mmp/web test:coverage

      - name: Upload Vitest coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          files: apps/web/coverage/coverage-final.json
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: frontend
          fail_ci_if_error: false

      - name: Upload Web coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: apps/web/coverage/coverage-summary.json
          retention-days: 1

      - name: Vitest coverage PR summary
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@c0c9b09c93750ee1d8335d14e94ce3d6fc61df50 # v2.11.0
        with:
          vite-config-path: apps/web/vitest.config.ts
          working-directory: apps/web

      - name: Build
        run: pnpm turbo build

  coverage-guard:
    # Phase 19 Residual PR-5b — Coverage Gate.
    # baseline: Go 43.9% / FE Lines 51.75% / FE Branches 79.66% / FE Functions 55.66% (2026-04-21)
    # current threshold: Go 41% / FE Lines 49% / FE Branches 77% / FE Functions 53% (baseline-2% buffer)
    # 로드맵:
    #   Phase 20: Go 55% / FE Lines 55% / FE Branches 80% (+~5%p — 추가 테스트 PR 선행 필수)
    #   Phase 21: Go 70% / FE Lines 65% / FE Branches 85% (+15%p — 하한 상향 전 반드시 테스트 보강)
    #   하한 상향 전에 반드시 추가 테스트 PR 로 baseline 끌어올리기.
    name: Coverage Regression Guard
    runs-on: self-hosted
    needs: [go-check, ts-check]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download Go coverage
        uses: actions/download-artifact@v4
        with:
          name: go-coverage
          path: apps/server

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.25"
          cache-dependency-path: apps/server/go.sum

      - name: Go coverage gate
        working-directory: apps/server
        run: |
          TOTAL=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          THRESHOLD=41
          if awk "BEGIN {exit !($TOTAL < $THRESHOLD)}"; then
            echo "::error::Go coverage ${TOTAL}% is below threshold ${THRESHOLD}%"
            echo "::error::Run 'cd apps/server && go test -coverprofile=coverage.out ./...' locally to investigate"
            exit 1
          fi
          echo "::notice::Go coverage ${TOTAL}% >= ${THRESHOLD}% (threshold)"

      - name: Download Web coverage
        uses: actions/download-artifact@v4
        with:
          name: web-coverage
          path: apps/web/coverage

      - name: Web coverage gate
        run: |
          LINES=$(jq '.total.lines.pct' apps/web/coverage/coverage-summary.json)
          BRANCHES=$(jq '.total.branches.pct' apps/web/coverage/coverage-summary.json)
          FUNCTIONS=$(jq '.total.functions.pct' apps/web/coverage/coverage-summary.json)
          LINES_THR=49
          BRANCHES_THR=77
          FUNCTIONS_THR=53
          FAIL=0
          if awk "BEGIN {exit !($LINES < $LINES_THR)}"; then
            echo "::error::FE Lines coverage ${LINES}% is below threshold ${LINES_THR}%"
            FAIL=1
          else
            echo "::notice::FE Lines coverage ${LINES}% >= ${LINES_THR}% (threshold)"
          fi
          if awk "BEGIN {exit !($BRANCHES < $BRANCHES_THR)}"; then
            echo "::error::FE Branches coverage ${BRANCHES}% is below threshold ${BRANCHES_THR}%"
            FAIL=1
          else
            echo "::notice::FE Branches coverage ${BRANCHES}% >= ${BRANCHES_THR}% (threshold)"
          fi
          if awk "BEGIN {exit !($FUNCTIONS < $FUNCTIONS_THR)}"; then
            echo "::error::FE Functions coverage ${FUNCTIONS}% is below threshold ${FUNCTIONS_THR}%"
            FAIL=1
          else
            echo "::notice::FE Functions coverage ${FUNCTIONS}% >= ${FUNCTIONS_THR}% (threshold)"
          fi
          if [ "$FAIL" = "1" ]; then
            echo "::error::Run 'cd apps/web && pnpm test:coverage' locally to investigate"
            exit 1
          fi

  docker-build:
    name: Docker Build Check
    runs-on: self-hosted
    needs: [go-check, ts-check]
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

      - name: Build Docker image
        id: docker-build
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: apps/server
          file: apps/server/Dockerfile
          push: false
          load: true
          tags: ghcr.io/sabyunrepo/mmp-server:ci-${{ github.sha }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/sabyunrepo/mmp-server:ci-${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: true
          artifact-name: sbom-cyclonedx

      - name: Attest build provenance
        # Only on main pushes — PR runs skip this to avoid sigstore noise.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/sabyunrepo/mmp-server
          subject-digest: ${{ steps.docker-build.outputs.digest }}

name: E2E — Stubbed Backend

# PR-required job: runs on every PR and push to main.
# Uses a real Postgres + Redis + Go server so PLAYWRIGHT_BACKEND=1
# is set, releasing the skip guard in all backend-gated spec files.
#
# Three core scenarios always execute, sharded 2× across two browsers:
#   1. 방 생성 → 시작 → 페이즈 진행  (game-session.spec.ts)
#   2. 재접속 복원                    (game-reconnect.spec.ts)
#   3. Redaction 확인               (game-redaction.spec.ts)
#
# NOTE: job name changed from "E2E Stubbed Backend (Chromium)" to the matrix
# form below. Branch-protection required-check labels MUST be updated after
# this PR merges.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Phase 18.8 PR-5: 수동 트리거 추가. PR에서 stubbed CI를 재실행하거나
  # 베타 단계에서 임시 시나리오 재현이 필요할 때 사용.
  workflow_dispatch:

concurrency:
  group: e2e-stubbed-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E (${{ matrix.browser }} shard ${{ matrix.shard }})
    runs-on: [self-hosted, containerized]
    # H-1: fork PR 의 untrusted code 가 shared named volume (playwright-cache/hostedtool-cache) 에
    # 악성 binary 를 심어 4 runner 횡전파하는 cache poisoning 차단.
    # fork PR 은 cache mount runner 를 우회 (skip). main / same-repo PR 만 실행.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
        shard: [1, 2]

    env:
      GAME_RUNTIME_V2: "true"
      PLAYWRIGHT_BACKEND: "1"

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # ── Service containers (myoung34/github-runner ↔ GHA services 호환 우회) ─
      # 정상 GHA services block 은 runner network 식별 실패로 fail.
      # 같은 runners-net bridge 에 직접 docker run → hostname 접근.

      - name: Start postgres + redis
        run: |
          set -euo pipefail
          # 같은 host 의 4 shard 가 동시 실행 가능 → unique container 이름.
          PG_NAME="e2e-pg-${{ github.run_id }}-${{ matrix.browser }}-${{ matrix.shard }}"
          REDIS_NAME="e2e-redis-${{ github.run_id }}-${{ matrix.browser }}-${{ matrix.shard }}"
          echo "PG_NAME=$PG_NAME" >> "$GITHUB_ENV"
          echo "REDIS_NAME=$REDIS_NAME" >> "$GITHUB_ENV"

          # runners-net network 동적 검출 (compose project prefix 무관).
          # 후보: runners-net (PR-168 6d5a71d explicit name) 또는
          # infra-runners_runners-net (compose project prefix — 현재 host).
          RUNNERS_NET=$(sudo docker network ls --format '{{.Name}}' | grep -E '(^|_)runners-net$' | head -1)
          if [ -z "$RUNNERS_NET" ]; then
            echo "::error::runners-net network not found on host"
            sudo docker network ls
            exit 1
          fi
          echo "RUNNERS_NET=$RUNNERS_NET" >> "$GITHUB_ENV"
          export RUNNERS_NET
          echo "Detected runners-net: $RUNNERS_NET"

          # 이전 run cleanup (이름 충돌 방지)
          sudo docker rm -f "$PG_NAME" "$REDIS_NAME" 2>/dev/null || true

          sudo docker run -d --name "$PG_NAME" \
            --network "$RUNNERS_NET" \
            -e POSTGRES_DB=mmp_e2e \
            -e POSTGRES_USER=mmp \
            -e POSTGRES_PASSWORD=mmp_e2e \
            --health-cmd "pg_isready -U mmp -d mmp_e2e" \
            --health-interval 5s \
            --health-timeout 3s \
            --health-retries 10 \
            postgres:17-alpine

          sudo docker run -d --name "$REDIS_NAME" \
            --network "$RUNNERS_NET" \
            --health-cmd "redis-cli ping" \
            --health-interval 5s \
            --health-timeout 3s \
            --health-retries 10 \
            redis:7-alpine

          # health 대기
          for i in $(seq 1 30); do
            pg_health=$(sudo docker inspect --format='{{.State.Health.Status}}' "$PG_NAME" 2>/dev/null || echo "starting")
            redis_health=$(sudo docker inspect --format='{{.State.Health.Status}}' "$REDIS_NAME" 2>/dev/null || echo "starting")
            if [ "$pg_health" = "healthy" ] && [ "$redis_health" = "healthy" ]; then
              echo "Both services healthy after ${i}s"
              break
            fi
            sleep 1
          done
          if [ "$pg_health" != "healthy" ] || [ "$redis_health" != "healthy" ]; then
            echo "::error::services failed to become healthy (postgres=$pg_health, redis=$redis_health)"
            sudo docker logs "$PG_NAME" 2>&1 | tail -30
            sudo docker logs "$REDIS_NAME" 2>&1 | tail -30
            exit 1
          fi

      # Export connection env — runners-net 의 hostname 으로 접근.
      - name: Export service connection env
        run: |
          echo "DATABASE_URL=postgres://mmp:mmp_e2e@${PG_NAME}:5432/mmp_e2e?sslmode=disable" >> "$GITHUB_ENV"
          echo "REDIS_URL=redis://${REDIS_NAME}:6379" >> "$GITHUB_ENV"

      # ── Go server ──────────────────────────────────────────────────────────

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.24"
          cache-dependency-path: apps/server/go.sum

      - name: Build server
        working-directory: apps/server
        run: go build -o /tmp/mmp-server ./cmd/server

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@v3.27.0

      - name: Run migrations
        working-directory: apps/server
        run: |
          goose -dir db/migrations postgres \
            "host=${PG_NAME} port=5432 user=mmp password=mmp_e2e dbname=mmp_e2e sslmode=disable" \
            up

      - name: Start server
        # DEBT-3: self-hosted runner는 job 사이에 user 프로세스가 leak 되면 다음 run 의
        # mmp-server bind 가 "address already in use" 로 즉사하고, 죽은 DB connection 을
        # 든 orphan listener 가 health check + 후속 request 에 stale 응답을 돌려준다.
        # 증상: seed register → 500 "failed to check existing user".
        # 따라서 (1) 시작 전 우리 user 의 mmp-server 잔재 정리, (2) 포트 점유 사전 검출,
        # (3) health check 루프 매 iteration 마다 우리 PID 생존 확인이 필요.
        # H-ARCH-1: 본 가드는 self-hosted bare-host runner 의 leaked mmp-server 차단용.
        # Phase 22 W3 atomic switch (모든 runs-on 을 [self-hosted, containerized] 로 전환) 머지 후
        # containerized runner 의 own network namespace 에서 :8080 공유가 사라지면 본 step 의
        # pkill + ss precheck 는 dead code. → W3 stable 1주 후 제거 검토.
        # H-SEC-1: pkill 을 우리 user 만으로 좁힘 (cross-kill 방지).
        run: |
          pkill -u "$(id -u)" -f /tmp/mmp-server || true
          sleep 1
          if (ss -ltn 2>/dev/null || netstat -ltn 2>/dev/null) | grep -qE ':8080[[:space:]]'; then
            echo "::error::port 8080 occupied before mmp-server start (orphan or parallel shard)"
            (ss -ltnp 2>/dev/null || netstat -ltnp 2>/dev/null) | grep ':8080' || true
            exit 1
          fi
          /tmp/mmp-server > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> "$GITHUB_ENV"
          ready=0
          for i in $(seq 1 30); do
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "::error::mmp-server (PID $SERVER_PID) died during startup"
              cat /tmp/server.log
              exit 1
            fi
            if curl -sf http://localhost:8080/health >/dev/null; then
              echo "Server ready after ${i}s (PID=$SERVER_PID)"
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" != "1" ]; then
            echo "::error::mmp-server health check did not pass within 30s"
            cat /tmp/server.log
            exit 1
          fi

      # ── Seed E2E user (Issue #46) ──────────────────────────────────────────
      # game-session/reconnect/redaction specs log in as e2e@test.com.
      # Without this seed, login() times out at 30s and all scenarios fail.

      - name: Seed E2E user
        run: |
          http_code=$(curl -s -o /tmp/seed.out -w "%{http_code}" \
            -X POST http://localhost:8080/api/v1/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"e2e@test.com","password":"e2etest1234","nickname":"E2E Tester"}')
          if [ "$http_code" = "201" ] || [ "$http_code" = "409" ]; then
            echo "Seed OK (http=$http_code)"
          else
            echo "Seed failed (http=$http_code):"
            cat /tmp/seed.out
            exit 1
          fi

      # ── Seed E2E theme (Phase 18.6 H6 fix re-enables this) ─────────────────
      # createRoom spec requires at least one PUBLISHED theme in the dropdown.
      # Depends on: Seed E2E user + migrations 00001..00003 applied.
      # ThemeCard + ThemeSummary were realigned with the server's snake_case
      # JSON contract (min_players / duration_min / cover_image) and play_count
      # / rating / difficulty are now optional, so this step no longer crashes
      # the lobby via ErrorBoundary.

      - name: Seed E2E theme
        # runner image 에 psql 미설치 + services block 제거 (PR-168) → postgres container
        # 안의 psql 호출 + stdin SQL redirect.
        run: |
          sudo docker exec -i \
            -e PGPASSWORD=mmp_e2e \
            "$PG_NAME" \
            psql -U mmp -d mmp_e2e -v ON_ERROR_STOP=1 \
            < apps/server/db/seed/e2e-themes.sql

      # ── Node / pnpm ────────────────────────────────────────────────────────

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers for matrix
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}

      - name: Build workspace packages
        # @mmp/ws-client is imported by apps/web and needs dist/ at vite dev time.
        # ui-tokens/eslint-config are CSS/config only — no build script.
        run: pnpm --filter "@mmp/game-logic" --filter "@mmp/shared" --filter "@mmp/ws-client" build

      # ── Frontend dev server ────────────────────────────────────────────────

      - name: Start frontend
        working-directory: apps/web
        run: |
          pnpm dev &
          echo "WEB_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000; then
              echo "Frontend ready after ${i}s"
              break
            fi
            sleep 1
          done

      # ── Core E2E scenarios (sharded + browser matrix) ──────────────────────

      - name: Run E2E
        working-directory: apps/web
        run: |
          pnpm exec playwright test \
            e2e/game-session.spec.ts \
            e2e/game-reconnect.spec.ts \
            e2e/game-redaction.spec.ts \
            --project=${{ matrix.browser }} \
            --shard=${{ matrix.shard }}/2 \
            --retries=1

      # ── Cleanup ────────────────────────────────────────────────────────────

      - name: Stop background processes
        if: always()
        run: |
          [ -n "$SERVER_PID" ] && kill "$SERVER_PID" || true
          [ -n "$WEB_PID" ] && kill "$WEB_PID" || true

      - name: Stop service containers
        if: always()
        run: |
          [ -n "$PG_NAME" ] && sudo docker rm -f "$PG_NAME" 2>/dev/null || true
          [ -n "$REDIS_NAME" ] && sudo docker rm -f "$REDIS_NAME" 2>/dev/null || true

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: blob-report-${{ matrix.browser }}-${{ matrix.shard }}
          path: apps/web/blob-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test-results (screenshots + traces)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-test-results-${{ matrix.browser }}-${{ matrix.shard }}
          path: apps/web/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mmp-server-log-${{ matrix.browser }}-${{ matrix.shard }}
          path: /tmp/server.log
          retention-days: 7
          if-no-files-found: ignore

  merge-reports:
    name: Merge Playwright reports
    # H-1 consistency: e2e 와 동일 fork PR 게이트 (cache mount runner 일관성).
    if: (always()) && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
    needs: [e2e]
    runs-on: [self-hosted, containerized]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Install pnpm
        # v5.0.0 reads packageManager from package.json automatically —
        # no `version:` input to avoid ERR_PNPM_BAD_PM_VERSION collision.
        uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download blob reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML report
        working-directory: apps/web
        run: pnpm exec playwright merge-reports --reporter html ../../all-blob-reports

      - name: Upload merged HTML report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-html-report
          path: apps/web/playwright-report
          retention-days: 7

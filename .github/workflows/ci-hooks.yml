name: ci-hooks (compound-mmp plugin self-tests)

on:
  pull_request:
    paths:
      - '.claude/plugins/compound-mmp/**'
      - '.github/workflows/ci-hooks.yml'
  push:
    branches: [main]
    paths:
      - '.claude/plugins/compound-mmp/**'
      - '.github/workflows/ci-hooks.yml'

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck (compound-mmp hooks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck
      - name: shellcheck hooks + scripts
        run: |
          set -e
          # severity=warning: SC2317/SC2329/SC2012 같은 info-level style 권고를 차단해
          # cascade fail 회피. SC2034 등 warning-level 은 여전히 차단 — 진짜 dead code 는 잡힘.
          # admin-skip 정책 (memory/project_ci_admin_skip_until_2026-05-01.md) 재평가 시
          # --severity=info 로 강화 검토.
          for f in .claude/plugins/compound-mmp/hooks/*.sh .claude/plugins/compound-mmp/scripts/*.sh; do
            echo "shellcheck $f"
            shellcheck --severity=warning -e SC2155,SC2086 "$f"
          done

  hook-tests-ubuntu:
    name: hook self-tests (ubuntu, bash 5.x)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y jq
      - name: bash version
        run: bash --version | head -1
      - name: dispatch-router self-tests
        run: bash .claude/plugins/compound-mmp/hooks/test-dispatch.sh
      - name: pre-edit-size self-tests
        run: bash .claude/plugins/compound-mmp/hooks/test-pre-edit-size.sh
      - name: pre-task-model self-tests
        run: bash .claude/plugins/compound-mmp/hooks/test-pre-task-model.sh
      - name: compound-review-dry-run self-tests
        run: bash .claude/plugins/compound-mmp/hooks/test-compound-review-dry-run.sh
      - name: compound-plan-dry-run self-tests
        run: bash .claude/plugins/compound-mmp/hooks/test-compound-plan-dry-run.sh
      - name: compound-work-dry-run self-tests
        run: bash .claude/plugins/compound-mmp/hooks/test-compound-work-dry-run.sh
      - name: compound-cycle-dry-run self-tests
        run: bash .claude/plugins/compound-mmp/hooks/test-compound-cycle-dry-run.sh

  hook-tests-macos:
    name: hook self-tests (macOS, bash 3.2)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify default bash is 3.2 (system bash)
        run: /bin/bash --version | head -1
      - name: Verify jq present
        run: jq --version
      - name: dispatch-router self-tests (system bash 3.2)
        run: /bin/bash .claude/plugins/compound-mmp/hooks/test-dispatch.sh
      - name: pre-edit-size self-tests (system bash 3.2)
        run: /bin/bash .claude/plugins/compound-mmp/hooks/test-pre-edit-size.sh
      - name: pre-task-model self-tests (system bash 3.2)
        run: /bin/bash .claude/plugins/compound-mmp/hooks/test-pre-task-model.sh
      - name: compound-review-dry-run self-tests (system bash 3.2)
        run: /bin/bash .claude/plugins/compound-mmp/hooks/test-compound-review-dry-run.sh
      - name: compound-plan-dry-run self-tests (system bash 3.2)
        run: /bin/bash .claude/plugins/compound-mmp/hooks/test-compound-plan-dry-run.sh
      - name: compound-work-dry-run self-tests (system bash 3.2)
        run: /bin/bash .claude/plugins/compound-mmp/hooks/test-compound-work-dry-run.sh
      - name: compound-cycle-dry-run self-tests (system bash 3.2)
        run: /bin/bash .claude/plugins/compound-mmp/hooks/test-compound-cycle-dry-run.sh

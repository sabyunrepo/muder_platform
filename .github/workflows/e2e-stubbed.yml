name: E2E вҖ” Stubbed Backend

# PR-required job: runs on every PR and push to main.
# Uses a real Postgres + Redis + Go server so PLAYWRIGHT_BACKEND=1
# is set, releasing the skip guard in all backend-gated spec files.
#
# Three core scenarios always execute, sharded 2Г— across two browsers:
#   1. л°© мғқм„ұ вҶ’ мӢңмһ‘ вҶ’ нҺҳмқҙмҰҲ м§„н–ү  (game-session.spec.ts)
#   2. мһ¬м ‘мҶҚ ліөмӣҗ                    (game-reconnect.spec.ts)
#   3. Redaction нҷ•мқё               (game-redaction.spec.ts)
#
# NOTE: job name changed from "E2E Stubbed Backend (Chromium)" to the matrix
# form below. Branch-protection required-check labels MUST be updated after
# this PR merges.

on:
  # paths filter (Phase 23 follow-up вҖ” CI pruning P0): docs/л©”лӘЁлҰ¬ commit мӢң fire 0.
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'tooling/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - 'playwright.config.ts'
      - 'e2e/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'tooling/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - 'playwright.config.ts'
      - 'e2e/**'
      - '.github/workflows/**'
  # Phase 18.8 PR-5: мҲҳлҸҷ нҠёлҰ¬кұ° м¶”к°Җ. PRм—җм„ң stubbed CIлҘј мһ¬мӢӨн–үн•ҳкұ°лӮҳ
  # лІ нғҖ лӢЁкі„м—җм„ң мһ„мӢң мӢңлӮҳлҰ¬мҳӨ мһ¬нҳ„мқҙ н•„мҡ”н•  л•Ң мӮ¬мҡ©.
  workflow_dispatch:

concurrency:
  group: e2e-stubbed-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E (${{ matrix.browser }} shard ${{ matrix.shard }})
    runs-on: ${{ github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'ready-for-ci') && 'ubuntu-latest' || 'arc-runner-set' }}
    # H-1: fork PR мқҳ untrusted code к°Җ shared named volume (playwright-cache/hostedtool-cache) м—җ
    # м•…м„ұ binary лҘј мӢ¬м–ҙ 4 runner нҡЎм „нҢҢн•ҳлҠ” cache poisoning м°ЁлӢЁ.
    # fork PR мқҖ cache mount runner лҘј мҡ°нҡҢ (skip). main / same-repo PR л§Ң мӢӨн–ү.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    # Phase 23 follow-up вҖ” CI pruning P2: PR fire мӢң chromium л§Ң (2 job).
    # push main / workflow_dispatch мӢң chromium + firefox (4 job).
    # firefox-only нҡҢк·ҖлҠ” main лЁём§Җ нӣ„ push fire лҳҗлҠ” dispatch лЎң кІҖмҰқ.
    strategy:
      fail-fast: false
      matrix:
        browser: ${{ fromJSON(github.event_name == 'pull_request' && '["chromium"]' || '["chromium","firefox"]') }}
        shard: [1, 2]

    env:
      GAME_RUNTIME_V2: "true"
      PLAYWRIGHT_BACKEND: "1"

    steps:
      - name: Full CI ready gate
        if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'ready-for-ci')
        working-directory: ${{ github.workspace }}
        run: |
          echo "::error::Full CIлҠ” CodeRabbit/Codecov м •лҰ¬ нӣ„ 'ready-for-ci' лқјлІЁмқ„ л¶ҷмҳҖмқ„ л•Ң мӢӨн–үн•©лӢҲлӢӨ."
          echo "::error::лҰ¬л·° лҢҖмқ‘ мӨ‘м—җлҠ” light checksл§Ң мӮ¬мҡ©н•ҳкі , merge м „ лқјлІЁмқ„ л¶ҷм—¬ full CIлҘј лӢӨмӢң мӢӨн–үн•ҳм„ёмҡ”."
          exit 1

      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # в”Җв”Җ Service containers (myoung34/github-runner вҶ” GHA services нҳёнҷҳ мҡ°нҡҢ) в”Җ
      # м •мғҒ GHA services block мқҖ runner network мӢқлі„ мӢӨнҢЁлЎң fail.
      # к°ҷмқҖ runners-net bridge м—җ м§Ғм ‘ docker run вҶ’ hostname м ‘к·ј.

      - name: Start postgres + redis
        run: |
          set -euo pipefail
          # к°ҷмқҖ host мқҳ 4 shard к°Җ лҸҷмӢң мӢӨн–ү к°ҖлҠҘ вҶ’ unique container мқҙлҰ„.
          PG_NAME="e2e-pg-${{ github.run_id }}-${{ matrix.browser }}-${{ matrix.shard }}"
          REDIS_NAME="e2e-redis-${{ github.run_id }}-${{ matrix.browser }}-${{ matrix.shard }}"
          echo "PG_NAME=$PG_NAME" >> "$GITHUB_ENV"
          echo "REDIS_NAME=$REDIS_NAME" >> "$GITHUB_ENV"

          # runners-net network лҸҷм Ғ кІҖм¶ң (compose project prefix л¬ҙкҙҖ).
          # нӣ„ліҙ: runners-net (PR-168 6d5a71d explicit name) лҳҗлҠ”
          # infra-runners_runners-net (compose project prefix вҖ” нҳ„мһ¬ host).
          # ARC ephemeral pod (DinD sidecar) м—җм„ңлҠ” fresh docker daemon вҖ” м—Ҷмңјл©ҙ мғқм„ұ.
          RUNNERS_NET=$(sudo docker network ls --format '{{.Name}}' | grep -E '(^|_)runners-net$' | head -1 || true)
          if [ -z "$RUNNERS_NET" ]; then
            RUNNERS_NET=runners-net
            sudo docker network create "$RUNNERS_NET" >/dev/null
            echo "Created runners-net (ARC ephemeral pod)"
          fi
          echo "RUNNERS_NET=$RUNNERS_NET" >> "$GITHUB_ENV"
          export RUNNERS_NET
          echo "Detected runners-net: $RUNNERS_NET"

          # мқҙм „ run cleanup (мқҙлҰ„ м¶©лҸҢ л°©м§Җ)
          sudo docker rm -f "$PG_NAME" "$REDIS_NAME" 2>/dev/null || true

          # ARC dind: runner вҶ” dind к°Җ pod network namespace кіөмң . -p publish нӣ„ localhost м ‘к·ј.
          # к°Ғ matrix shard лҠ” лҸ…лҰҪ ARC pod лқј port м¶©лҸҢ м—ҶмқҢ (5432/6379 pod-local).
          # Docker Hub anonymous pull limit can fail ARC fresh-daemon jobs.
          # Use the public ECR mirror of Docker official images for CI services.
          sudo docker run -d --name "$PG_NAME" \
            --network "$RUNNERS_NET" \
            -p 5432:5432 \
            -e POSTGRES_DB=mmp_e2e \
            -e POSTGRES_USER=mmp \
            -e POSTGRES_PASSWORD=mmp_e2e \
            --health-cmd "pg_isready -U mmp -d mmp_e2e" \
            --health-interval 5s \
            --health-timeout 3s \
            --health-retries 10 \
            public.ecr.aws/docker/library/postgres:17-alpine

          sudo docker run -d --name "$REDIS_NAME" \
            --network "$RUNNERS_NET" \
            -p 6379:6379 \
            --health-cmd "redis-cli ping" \
            --health-interval 5s \
            --health-timeout 3s \
            --health-retries 10 \
            public.ecr.aws/docker/library/redis:7-alpine

          # health лҢҖкё° вҖ” Docker healthcheck max = interval 5s Г— retries 10 = 50s.
          # PR-170 4-agent review (Perf-1 + Test-1) fold-in: 60s ceiling мңјлЎң мқјкҙҖм„ұ мғҒн–Ҙ.
          # 30s мқҙм „ ceiling мқҖ cold start (image pull + initdb) мӢң false-fail к°ҖлҠҘ.
          for i in $(seq 1 60); do
            pg_health=$(sudo docker inspect --format='{{.State.Health.Status}}' "$PG_NAME" 2>/dev/null || echo "starting")
            redis_health=$(sudo docker inspect --format='{{.State.Health.Status}}' "$REDIS_NAME" 2>/dev/null || echo "starting")
            if [ "$pg_health" = "healthy" ] && [ "$redis_health" = "healthy" ]; then
              echo "Both services healthy after ${i}s"
              break
            fi
            sleep 1
          done
          if [ "$pg_health" != "healthy" ] || [ "$redis_health" != "healthy" ]; then
            echo "::error::services failed to become healthy (postgres=$pg_health, redis=$redis_health)"
            sudo docker logs "$PG_NAME" 2>&1 | tail -30
            sudo docker logs "$REDIS_NAME" 2>&1 | tail -30
            exit 1
          fi

      # Export connection env вҖ” runners-net мқҳ hostname мңјлЎң м ‘к·ј.
      - name: Export service connection env
        run: |
          # ARC dind: runner вҶ” dind к°Җ pod network кіөмң . localhost лЎң м ‘к·ј.
          echo "DATABASE_URL=postgres://mmp:mmp_e2e@localhost:5432/mmp_e2e?sslmode=disable" >> "$GITHUB_ENV"
          echo "REDIS_URL=redis://localhost:6379" >> "$GITHUB_ENV"

      # в”Җв”Җ Go server в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: apps/server/go.mod
          cache: false  # image-resident toolchain: GOMODCACHE/GOCACHEлҠ” named volume mount.

      - name: Build server
        working-directory: apps/server
        run: go build -o /tmp/mmp-server ./cmd/server

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@v3.27.0

      - name: Run migrations
        working-directory: apps/server
        run: |
          goose -dir db/migrations postgres \
            "host=localhost port=5432 user=mmp password=mmp_e2e dbname=mmp_e2e sslmode=disable" \
            up

      - name: Start server
        # DEBT-3: self-hosted runnerлҠ” job мӮ¬мқҙм—җ user н”„лЎңм„ёмҠӨк°Җ leak лҗҳл©ҙ лӢӨмқҢ run мқҳ
        # mmp-server bind к°Җ "address already in use" лЎң мҰүмӮ¬н•ҳкі , мЈҪмқҖ DB connection мқ„
        # л“  orphan listener к°Җ health check + нӣ„мҶҚ request м—җ stale мқ‘лӢөмқ„ лҸҢл ӨмӨҖлӢӨ.
        # мҰқмғҒ: seed register вҶ’ 500 "failed to check existing user".
        # л”°лқјм„ң (1) мӢңмһ‘ м „ мҡ°лҰ¬ user мқҳ mmp-server мһ”мһ¬ м •лҰ¬, (2) нҸ¬нҠё м җмң  мӮ¬м „ кІҖм¶ң,
        # (3) health check лЈЁн”„ л§Ө iteration л§ҲлӢӨ мҡ°лҰ¬ PID мғқмЎҙ нҷ•мқёмқҙ н•„мҡ”.
        # H-ARCH-1: ліё к°Җл“ңлҠ” self-hosted bare-host runner мқҳ leaked mmp-server м°ЁлӢЁмҡ©.
        # Phase 22 W3 atomic switch (лӘЁл“  runs-on мқ„ [self-hosted, containerized] лЎң м „нҷҳ) лЁём§Җ нӣ„
        # containerized runner мқҳ own network namespace м—җм„ң :8080 кіөмң к°Җ мӮ¬лқјм§Җл©ҙ ліё step мқҳ
        # pkill + ss precheck лҠ” dead code. вҶ’ W3 stable 1мЈј нӣ„ м ңкұ° кІҖнҶ .
        # H-SEC-1: pkill мқ„ мҡ°лҰ¬ user л§ҢмңјлЎң мўҒнһҳ (cross-kill л°©м§Җ).
        run: |
          pkill -u "$(id -u)" -f /tmp/mmp-server || true
          sleep 1
          if (ss -ltn 2>/dev/null || netstat -ltn 2>/dev/null) | grep -qE ':8080[[:space:]]'; then
            echo "::error::port 8080 occupied before mmp-server start (orphan or parallel shard)"
            (ss -ltnp 2>/dev/null || netstat -ltnp 2>/dev/null) | grep ':8080' || true
            exit 1
          fi
          /tmp/mmp-server > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> "$GITHUB_ENV"
          ready=0
          for i in $(seq 1 30); do
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "::error::mmp-server (PID $SERVER_PID) died during startup"
              cat /tmp/server.log
              exit 1
            fi
            if curl -sf http://localhost:8080/health >/dev/null; then
              echo "Server ready after ${i}s (PID=$SERVER_PID)"
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" != "1" ]; then
            echo "::error::mmp-server health check did not pass within 30s"
            cat /tmp/server.log
            exit 1
          fi

      # в”Җв”Җ Seed E2E user (Issue #46) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      # game-session/reconnect/redaction specs log in as e2e@test.com.
      # Without this seed, login() times out at 30s and all scenarios fail.

      - name: Seed E2E user
        run: |
          http_code=$(curl -s -o /tmp/seed.out -w "%{http_code}" \
            -X POST http://localhost:8080/api/v1/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"e2e@test.com","password":"e2etest1234","nickname":"E2E Tester"}')
          if [ "$http_code" = "201" ] || [ "$http_code" = "409" ]; then
            echo "Seed OK (http=$http_code)"
          else
            echo "Seed failed (http=$http_code):"
            cat /tmp/seed.out
            exit 1
          fi

      # в”Җв”Җ Seed E2E theme (Phase 18.6 H6 fix re-enables this) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      # createRoom spec requires at least one PUBLISHED theme in the dropdown.
      # Depends on: Seed E2E user + migrations 00001..00003 applied.
      # ThemeCard + ThemeSummary were realigned with the server's snake_case
      # JSON contract (min_players / duration_min / cover_image) and play_count
      # / rating / difficulty are now optional, so this step no longer crashes
      # the lobby via ErrorBoundary.

      - name: Seed E2E theme
        # runner image м—җ psql лҜём„Өм№ҳ + services block м ңкұ° (PR-168) вҶ’ postgres container
        # м•Ҳмқҳ psql нҳём¶ң + stdin SQL redirect.
        run: |
          sudo docker exec -i \
            -e PGPASSWORD=mmp_e2e \
            "$PG_NAME" \
            psql -U mmp -d mmp_e2e -v ON_ERROR_STOP=1 \
            < apps/server/db/seed/e2e-themes.sql

      # в”Җв”Җ Node / pnpm в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # в”Җв”Җ Cache volume permissions (PR-168 EACCES fix) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      # Docker named volume (playwright-cache, hostedtool-cache) к°Җ default root:root
      # мҶҢмң лЎң мғқм„ұлҗҳм–ҙ runner user мқҳ mkdir кұ°л¶Җ (Failed to install browsers /
      # EACCES: permission denied, mkdir '/opt/cache/playwright/__dirlock').
      # 4 runner к°Җ к°ҷмқҖ named volume кіөмң  вҖ” chown idempotent, race м—ҶмқҢ.
      - name: Prepare cache volume permissions
        run: |
          sudo mkdir -p /opt/cache/playwright /opt/hostedtoolcache
          sudo chown -R "$(id -u):$(id -g)" /opt/cache/playwright /opt/hostedtoolcache

      # Playwright `--with-deps` requires `fonts-freefont-ttf` which is
      # deprecated on the ARC runner's OS image вҖ” split into best-effort deps
      # install + always-required browser install. Browsers themselves do not
      # need that font (chromium ships its own fallbacks for headless QA).
      - name: Install Playwright system deps (best-effort)
        timeout-minutes: 8
        continue-on-error: true
        working-directory: apps/web
        run: |
          if [ -f /opt/mmp-runner/playwright-deps-ready ]; then
            echo "Playwright system deps are pre-baked in the ARC runner image"
            exit 0
          fi
          timeout 480s bash -lc 'sudo apt-get update -y || true; pnpm exec playwright install-deps ${{ matrix.browser }}' || \
            echo "::warning::Playwright install-deps failed or timed out (likely ARC apt/deps flake); continuing without"

      - name: Install Playwright browsers for matrix
        working-directory: apps/web
        run: pnpm exec playwright install ${{ matrix.browser }}

      - name: Build workspace packages
        # @mmp/ws-client is imported by apps/web and needs dist/ at vite dev time.
        # ui-tokens/eslint-config are CSS/config only вҖ” no build script.
        run: pnpm --filter "@mmp/game-logic" --filter "@mmp/shared" --filter "@mmp/ws-client" build

      # в”Җв”Җ Frontend dev server в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

      - name: Start frontend
        working-directory: apps/web
        run: |
          pnpm dev &
          echo "WEB_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000; then
              echo "Frontend ready after ${i}s"
              break
            fi
            sleep 1
          done

      # в”Җв”Җ Core E2E scenarios (sharded + browser matrix) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

      - name: Run E2E
        working-directory: apps/web
        run: |
          pnpm exec playwright test \
            e2e/game-session.spec.ts \
            e2e/game-reconnect.spec.ts \
            e2e/game-redaction.spec.ts \
            --project=${{ matrix.browser }} \
            --shard=${{ matrix.shard }}/2 \
            --retries=1

      # в”Җв”Җ Cleanup в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

      - name: Stop background processes
        if: always()
        run: |
          [ -n "$SERVER_PID" ] && kill "$SERVER_PID" || true
          [ -n "$WEB_PID" ] && kill "$WEB_PID" || true

      - name: Stop service containers
        if: always()
        run: |
          [ -n "$PG_NAME" ] && sudo docker rm -f "$PG_NAME" 2>/dev/null || true
          [ -n "$REDIS_NAME" ] && sudo docker rm -f "$REDIS_NAME" 2>/dev/null || true

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: blob-report-${{ matrix.browser }}-${{ matrix.shard }}
          path: apps/web/blob-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test-results (screenshots + traces)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-test-results-${{ matrix.browser }}-${{ matrix.shard }}
          path: apps/web/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mmp-server-log-${{ matrix.browser }}-${{ matrix.shard }}
          path: /tmp/server.log
          retention-days: 7
          if-no-files-found: ignore

  merge-reports:
    name: Merge Playwright reports
    # H-1 consistency: e2e мҷҖ лҸҷмқј fork PR кІҢмқҙнҠё (cache mount runner мқјкҙҖм„ұ).
    if: (always()) && (github.event_name != 'pull_request' || (github.event.pull_request.head.repo.fork == false && contains(github.event.pull_request.labels.*.name, 'ready-for-ci')))
    needs: [e2e]
    runs-on: arc-runner-set
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Install pnpm
        # v5.0.0 reads packageManager from package.json automatically вҖ”
        # no `version:` input to avoid ERR_PNPM_BAD_PM_VERSION collision.
        uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download blob reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML report
        working-directory: apps/web
        # 4 self-hosted containerized runner мқҳ working dir
        # (`/_work/containerized-runner-{1,2,3,4}/.../apps/web/e2e`) к°Җ м„ңлЎң лӢ¬лқј
        # blob report мқҳ record лҗң testDir к°Җ 4 path вҶ’ "Blob reports were recorded
        # with different test directories" merge fail. -c мҳөм…ҳмңјлЎң playwright.config.ts
        # мқҳ testDir лҘј лӘ…мӢң к°•м ң (resolve мӢңм җ м •к·ңнҷ”).
        run: pnpm exec playwright merge-reports --reporter html -c playwright.config.ts ../../all-blob-reports

      - name: Upload merged HTML report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-html-report
          path: apps/web/playwright-report
          retention-days: 7

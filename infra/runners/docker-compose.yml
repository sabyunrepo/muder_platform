# infra/runners/docker-compose.yml
# Phase 22 — Runner Containerization
# Spec: docs/superpowers/specs/2026-04-28-phase-22-runner-containerization-design.md
#
# Env precedence (compose 카논): env_file < environment 블록.
# .env에 LABELS/EPHEMERAL 등 override 시 environment: 블록이 silent override 함 — 주의.
# 라벨/EPHEMERAL/RUN_AS_ROOT 변경은 본 파일에서 수정.

x-runner-base: &runner-base
  # Phase 23 Custom Runner Image (`build-runner-image.yml` GHCR push, Public visibility).
  # Renovate가 GHCR digest 추적 (Phase 18.7 카논 + Phase 23 spec § 4.4).
  image: ghcr.io/sabyunrepo/mmp-runner:latest
  pull_policy: always
  restart: always
  env_file: .env
  environment: &runner-env
    EPHEMERAL: "true"
    DISABLE_AUTO_UPDATE: "true"
    RUN_AS_ROOT: "false"
    # 컨테이너 OS = linux (호스트 macOS와 별개). Phase 23 ARM image 진입 시 arm64/amd64 라벨 추가.
    LABELS: "self-hosted,linux,containerized"
    # Image-resident toolchain (Phase 23 follow-up):
    # GOMODCACHE/GOCACHE/PNPM_STORE_PATH는 image ENV에서 정의. compose는 named volume mount만.
    # Playwright는 별 cache (GHA cache 미적용 — image 비대 회피).
    PLAYWRIGHT_BROWSERS_PATH: /opt/cache/playwright
    # L-ARCH-1: actions/setup-* 의 hostedtoolcache 위치 명시 (dead config 방지).
    RUNNER_TOOL_CACHE: /opt/hostedtoolcache
  group_add:
    - "${DOCKER_GID}"
  mem_limit: 3g
  networks:
    - runners-net

services:
  runner-1:
    <<: *runner-base
    container_name: containerized-runner-1
    environment:
      <<: *runner-env
      RUNNER_NAME: containerized-runner-1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner1-work:/runner/_work
      - playwright-cache:/opt/cache/playwright
      - hostedtool-cache:/opt/hostedtoolcache
      - go-mod-cache:/home/runner/go/pkg/mod
      - go-build-cache:/home/runner/.cache/go-build
      - pnpm-store:/home/runner/.pnpm-store

  runner-2:
    <<: *runner-base
    container_name: containerized-runner-2
    environment:
      <<: *runner-env
      RUNNER_NAME: containerized-runner-2
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner2-work:/runner/_work
      - playwright-cache:/opt/cache/playwright
      - hostedtool-cache:/opt/hostedtoolcache
      - go-mod-cache:/home/runner/go/pkg/mod
      - go-build-cache:/home/runner/.cache/go-build
      - pnpm-store:/home/runner/.pnpm-store

  runner-3:
    <<: *runner-base
    container_name: containerized-runner-3
    environment:
      <<: *runner-env
      RUNNER_NAME: containerized-runner-3
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner3-work:/runner/_work
      - playwright-cache:/opt/cache/playwright
      - hostedtool-cache:/opt/hostedtoolcache
      - go-mod-cache:/home/runner/go/pkg/mod
      - go-build-cache:/home/runner/.cache/go-build
      - pnpm-store:/home/runner/.pnpm-store

  runner-4:
    <<: *runner-base
    container_name: containerized-runner-4
    environment:
      <<: *runner-env
      RUNNER_NAME: containerized-runner-4
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner4-work:/runner/_work
      - playwright-cache:/opt/cache/playwright
      - hostedtool-cache:/opt/hostedtoolcache
      - go-mod-cache:/home/runner/go/pkg/mod
      - go-build-cache:/home/runner/.cache/go-build
      - pnpm-store:/home/runner/.pnpm-store

volumes:
  runner1-work:
  runner2-work:
  runner3-work:
  runner4-work:
  # 4 runner 공유 cache: image-resident toolchain backing storage.
  # 첫 가동 시 image의 GOMODCACHE pre-bake 데이터가 named volume으로 자동 복사 (Docker 카논).
  # image update (go.sum 변경 → image rebuild) 적용 시 사용자 host에서 명시 cleanup 필요:
  #   docker compose down && docker volume rm <project>_go-mod-cache && docker compose up -d
  playwright-cache: {}
  hostedtool-cache: {}
  go-mod-cache: {}
  go-build-cache: {}
  pnpm-store: {}

networks:
  runners-net:
    # explicit name — docker compose project prefix 회피.
    # workflow step 의 `--network runners-net` 가 정확한 이름 매칭 가능.
    # 변경 후 사용자 host 에서 재배포 필요: docker compose down && docker compose up -d.
    name: runners-net
    driver: bridge
